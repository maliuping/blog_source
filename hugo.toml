baseURL = "https://maliuping.github.io/"
languageCode = "zh-cn"
title = "Logan's Lab"

theme = "PaperMod"

pagination.pagerSize = 10

enableRobotsTXT = true

[outputs]
home = ["HTML", "RSS", "JSON"]

[params]

author = "Logan"

ShowReadingTime = true
ShowCodeCopyButtons = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
defaultTheme = "auto"
ShowToc = true
TocOpen = true

[params.homeInfoParams]

